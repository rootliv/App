workflows:
  android-debug:
    name: "Pàgina — Android (debug, senza firma)"
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 20
      vars:
        PACKAGE_NAME: "io.github.rootliv.pagina"
    scripts:
      - name: Installa dipendenze npm
        script: npm install
      - name: Genera www/ dal sito
        script: bash scripts/build-www.sh
      - name: Sincronizza il progetto Android
        script: npx cap sync android
      - name: Build APK di debug
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - dalberto.1688869@studenti.uniroma1.it
        notify:
          success: true
          failure: true

  android-release:
    name: "Pàgina — Android (release firmato, per Play Store)"
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 20
      android_signing:
        - pagina_keystore
      vars:
        PACKAGE_NAME: "io.github.rootliv.pagina"
    scripts:
      - name: Installa dipendenze npm
        script: npm install
      - name: Genera www/ dal sito
        script: bash scripts/build-www.sh
      - name: Sincronizza il progetto Android
        script: npx cap sync android
      - name: Build AAB firmato
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - dalberto.1688869@studenti.uniroma1.it
        notify:
          success: true
          failure: true

  ios-release:
    name: "Pàgina — iOS (richiede Apple Developer Program)"
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.github.rootliv.pagina
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      node: 20
    scripts:
      - name: Installa dipendenze npm
        script: npm install
      - name: Genera www/ dal sito
        script: bash scripts/build-www.sh
      - name: Sincronizza il progetto iOS
        script: npx cap sync ios
      - name: Installa i pod
        script: cd ios/App && pod install
      - name: Imposta la firma automatica
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
